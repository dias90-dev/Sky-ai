
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Ai</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(168, 85, 247, 0.5); /* Lilac */
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(168, 85, 247, 1);
        }
        
        @keyframes progress {
          from { width: 0%; }
          to { width: 100%; }
        }
        
        .animate-shake {
          animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        
        @keyframes shake {
          10%, 90% { transform: translate3d(-1px, 0, 0); }
          20%, 80% { transform: translate3d(2px, 0, 0); }
          30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
          40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .bg-clouds {
          background-color: #f8fafc; /* Very light silver/slate */
          background-image: 
            radial-gradient(at 0% 0%, rgba(203,213,225, 0.5) 0px, transparent 50%),
            radial-gradient(at 100% 0%, rgba(241,245,249, 1) 0px, transparent 50%),
            radial-gradient(at 100% 100%, rgba(216,180,254, 0.15) 0px, transparent 50%), /* Soft lilac hint */
            radial-gradient(at 0% 100%, rgba(248,250,252, 1) 0px, transparent 50%);
          background-attachment: fixed;
        }

        .dark .bg-clouds {
          background-color: #0f172a; /* Deep slate */
          background-image: 
            radial-gradient(at 0% 0%, rgba(147, 51, 234, 0.15) 0px, transparent 50%), /* Deep Lilac/Purple */
            radial-gradient(at 100% 0%, rgba(15, 23, 42, 1) 0px, transparent 50%),
            radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.12) 0px, transparent 50%), /* Light Lilac */
            radial-gradient(at 0% 100%, rgba(30, 41, 59, 0.8) 0px, transparent 50%);
          background-attachment: fixed;
        }

        .glass-panel {
          background: rgba(255, 255, 255, 0.6);
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
          border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .dark .glass-panel {
          background: rgba(15, 23, 42, 0.6);
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
          border-bottom: 1px solid rgba(168, 85, 247, 0.2); 
        }
        
        .glass-card {
          background: rgba(255, 255, 255, 0.7);
          backdrop-filter: blur(10px);
          -webkit-backdrop-filter: blur(10px);
          border: 1px solid rgba(255, 255, 255, 0.6);
          box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .dark .glass-card {
          background: rgba(30, 41, 59, 0.6);
          backdrop-filter: blur(10px);
          -webkit-backdrop-filter: blur(10px);
          border: 1px solid rgba(168, 85, 247, 0.25);
          box-shadow: 0 8px 16px -4px rgba(0, 0, 0, 0.3), 0 4px 8px -4px rgba(0, 0, 0, 0.2);
        }
        
        .glass-button {
          background: rgba(168, 85, 247, 0.8);
          backdrop-filter: blur(4px);
          border: 1px solid rgba(192, 132, 252, 0.5);
          box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }

        .dark .glass-button {
          background: rgba(147, 51, 234, 0.8);
          border: 1px solid rgba(192, 132, 252, 0.4);
          box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
        }

        .signal-enter {
          animation: slideInFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideInFade {
          0% {
            opacity: 0;
            transform: translateY(20px) scale(0.98);
          }
          100% {
            opacity: 1;
            transform: translateY(0) scale(1);
          }
        }
    </style>
<script type="importmap">
{

</html>
